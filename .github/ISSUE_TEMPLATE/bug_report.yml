name: Bug Report
description: Create a report to help us improve the guide
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please remember this is a beginner-friendly documentation repository.
  - type: input
    id: chapter
    attributes:
      label: Chapter or File Name
      description: Which chapter or file does this bug appear in? (e.g., 05-linux-vs-windows.md)
      placeholder: "e.g., 20-installation.md"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is. (e.g., Typo, broken link, incorrect command)
      placeholder: "When following step X, the command Y fails with error Z."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., OS version, hardware specs if relevant to a boot issue).
